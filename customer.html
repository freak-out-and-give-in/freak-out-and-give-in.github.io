<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="base.css">
</head>
<body>
    <header>
        <div class="logo">
            <p>Florist database</p>
            <img src="flower.png" alt="2D red flower with 4 petals and a yellow centre">
        </div>
        <div class="links">
            <a href="index.html">Orders</a>
            <a href="product.html">Products</a>
            <a href="product-category.html">Product categories</a>
            <a href="order-item.html">Order items</a>
            <a href="customer.html">Customer</a>
            <a href="employee.html">Employee</a>
        </div>
    </header>
    <main>
        <h1>Customers</h1>
        <form action="" method="">
            <p>
                <label for="first_name">First name:</label>
                <input type="text" id="first_name" name="first_name" minlength="1"  maxlength="255" required>
            </p>
            <p>
                <label for="last_name">Last name:</label>
                <input type="text" id="last_name" name="last_name" minlength="1"  maxlength="255" required>
            </p>
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" minlength="1"  maxlength="255">
            </p>
            <p>
                <label for="phone">Phone number (+44):</label>
                <input type="tel" id="phone" name="phone" pattern="[0-9]+" minlength="11" maxlength="11">
            </p>
            <p>
                <label for="address">Address:</label>
                <input type="text" id="address" name="address" minlength="1" maxlength="255">
            </p>
            <p class="button">
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
</body>
</html>
