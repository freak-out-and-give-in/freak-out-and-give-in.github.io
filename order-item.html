<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="base.css">
</head>
<body>
    <header>
        <div class="logo">
            <p>Florist database</p>
            <img src="flower.png" alt="2D red flower with 4 petals and a yellow centre">
        </div>
        <div class="links">
            <a href="order.html">Orders</a>
            <a href="product.html">Products</a>
            <a href="product-category.html">Product categories</a>
            <a href="order-item.html">Order items</a>
            <a href="customer.html">Customer</a>
            <a href="employee.html">Employee</a>
        </div>
    </header>
    <main>
        <h1>Order items</h1>
        <form action="" method="">
            <p>
                <label for="product_id">Product ID:</label>
                <input type="number" id="product_id" name="product_id" min="0" required>
            </p>
            <p>
                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" name="quantity" min="1" max="9999" required>
            </p>
            <p>
                <label for="price">Price:</label>
                <input type="number" id="price" name="price" min="0" max="9999999" step=".01" required>
            </p>
            <p class="button">
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
</body>
</html>
