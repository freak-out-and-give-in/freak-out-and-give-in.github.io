<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="base.css">
</head>
<body>
    <header>
        <div class="logo">
            <p>Florist database</p>
            <img src="flower.png" alt="2D red flower with 4 petals and a yellow centre">
        </div>
        <div class="links">
            <a href="index.html">Orders</a>
            <a href="product.html">Products</a>
            <a href="product-category.html">Product categories</a>
            <a href="order-item.html">Order items</a>
            <a href="customer.html">Customer</a>
            <a href="employee.html">Employee</a>
        </div>
    </header>
    <main>
        <h1>Products</h1>
        <form action="" method="">
            <p>
                <label for="category_id">Category ID:</label>
                <input type="number" id="category_id" name="category_id" min="0" required>
            </p>
            <p>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" minlength="1" maxlength="255" required>
            </p>
            <p>
                <label for="description">Description:</label>
                <input type="text" id="description" name="description" maxlength="255">
            </p>
            <p>
                <label for="sku">SKU:</label>
                <input type="text" id="sku" name="sku" minlength="12" maxlength="12" required>
            </p>
            <p>
                <label for="price">Price (£):</label>
                <input type="number" id="price" name="price" min="0" max="9999999" step=".01" required>
            </p>
            <p>
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" name="weight" min="0" max="9999" step=".01" required>
            </p>
            <p>
                <label for="colour">Colour:</label>
                <input type="color" id="colour" name="colour" minlength="1" maxlength="45" required>
            </p>
            <p class="button">
                <button type="submit">Submit</button>
            </p>
        </form>
    </main>
</body>
</html>
